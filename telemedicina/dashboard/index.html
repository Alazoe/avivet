<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AviVet — Panel de Consultas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f0; color: #222; min-height: 100vh; }

    /* ── LOGIN ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #1b5e20;
    }
    .login-box {
      background: #fff; border-radius: 12px; padding: 40px 36px;
      width: 320px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,.25);
    }
    .login-logo {
      width: 64px; height: 64px; border-radius: 50%; background: #2e7d32;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 26px; font-weight: 900; margin: 0 auto 16px;
    }
    .login-box h2 { font-size: 17pt; color: #1b5e20; margin-bottom: 4px; }
    .login-box p  { font-size: 9pt; color: #777; margin-bottom: 24px; }
    .login-box input {
      width: 100%; border: 1.5px solid #ccc; border-radius: 6px;
      padding: 10px 14px; font-size: 12pt; text-align: center;
      letter-spacing: 3px; margin-bottom: 12px;
    }
    .login-box input:focus { outline: none; border-color: #2e7d32; }
    .login-btn {
      width: 100%; background: #2e7d32; color: #fff; border: none;
      border-radius: 6px; padding: 11px; font-size: 11pt; font-weight: 700;
      cursor: pointer; transition: background .15s;
    }
    .login-btn:hover { background: #1b5e20; }
    .login-error { color: #c62828; font-size: 9pt; margin-top: 8px; display: none; }

    /* ── APP ── */
    #app { display: none; }

    .topbar {
      background: #2e7d32; color: #fff; padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    .topbar-brand { display: flex; align-items: center; gap: 10px; }
    .topbar-logo {
      width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 900;
    }
    .topbar-brand h1 { font-size: 14pt; font-weight: 800; }
    .topbar-brand p  { font-size: 8.5pt; opacity: .8; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .btn-refresh {
      background: rgba(255,255,255,.2); color: #fff; border: none;
      border-radius: 6px; padding: 6px 14px; font-size: 9pt; font-weight: 700;
      cursor: pointer; transition: background .15s;
    }
    .btn-refresh:hover { background: rgba(255,255,255,.35); }
    .total-badge {
      background: rgba(255,255,255,.15); border-radius: 20px;
      padding: 4px 12px; font-size: 9pt; font-weight: 700;
    }

    /* ── STATS ── */
    .stats-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
      padding: 16px 24px 8px;
    }
    .stat-card {
      background: #fff; border-radius: 8px; padding: 14px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08); text-align: center;
    }
    .stat-card .num { font-size: 22pt; font-weight: 900; color: #2e7d32; line-height: 1; }
    .stat-card .lbl { font-size: 8pt; color: #777; margin-top: 4px; text-transform: uppercase; letter-spacing: .3px; }

    /* ── FILTROS ── */
    .filters {
      display: flex; gap: 10px; flex-wrap: wrap;
      padding: 8px 24px 14px; align-items: center;
    }
    .filters input, .filters select {
      border: 1px solid #ccc; border-radius: 6px;
      padding: 6px 10px; font-size: 9.5pt; font-family: inherit;
      background: #fff;
    }
    .filters input:focus, .filters select:focus { outline: none; border-color: #2e7d32; }
    .filters input[type="search"] { min-width: 200px; }
    .btn-clear {
      background: #fff; border: 1px solid #ccc; border-radius: 6px;
      padding: 6px 12px; font-size: 9pt; cursor: pointer; color: #555;
    }
    .btn-clear:hover { border-color: #2e7d32; color: #2e7d32; }

    /* ── GRID TARJETAS ── */
    .cards-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 14px; padding: 0 24px 32px;
    }
    .card {
      background: #fff; border-radius: 10px; overflow: hidden;
      box-shadow: 0 1px 5px rgba(0,0,0,.10); cursor: pointer;
      transition: transform .15s, box-shadow .15s; border: 1.5px solid transparent;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.15); border-color: #81c784; }
    .card-header {
      background: #2e7d32; color: #fff; padding: 10px 14px;
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .card-header .productor { font-size: 11pt; font-weight: 700; line-height: 1.3; }
    .card-header .fecha     { font-size: 8pt; opacity: .85; margin-top: 2px; }
    .card-header .region-badge {
      background: rgba(255,255,255,.2); border-radius: 12px;
      padding: 2px 8px; font-size: 8pt; white-space: nowrap; flex-shrink: 0; margin-left: 8px;
    }
    .card-body { padding: 12px 14px; }
    .card-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 9.5pt; }
    .card-row .lbl { color: #777; }
    .card-row .val { font-weight: 600; color: #222; text-align: right; max-width: 60%; }
    .motivo-tag {
      display: inline-block; background: #e8f5e9; color: #2e7d32;
      border-radius: 12px; padding: 3px 10px; font-size: 8.5pt; font-weight: 700;
      margin-bottom: 8px;
    }
    .motivo-tag.rojo  { background: #ffebee; color: #c62828; }
    .motivo-tag.amber { background: #fff8e1; color: #e65100; }
    .card-footer {
      padding: 8px 14px; border-top: 1px solid #f0f0f0;
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .chip {
      background: #f5f5f5; border-radius: 12px; padding: 2px 9px;
      font-size: 8pt; color: #555;
    }
    .chip.green { background: #e8f5e9; color: #2e7d32; }
    .fotos-link {
      margin-left: auto; color: #2e7d32; font-size: 8.5pt; font-weight: 700;
      text-decoration: none; display: flex; align-items: center; gap: 4px;
    }
    .fotos-link:hover { text-decoration: underline; }

    /* ── MODAL DETALLE ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 200;
      align-items: center; justify-content: center; padding: 16px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #fff; border-radius: 12px; width: 100%; max-width: 680px;
      max-height: 90vh; overflow-y: auto; box-shadow: 0 12px 40px rgba(0,0,0,.3);
    }
    .modal-header {
      background: #2e7d32; color: #fff; padding: 14px 20px;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0;
    }
    .modal-header h2 { font-size: 13pt; }
    .modal-header .fecha { font-size: 9pt; opacity: .85; }
    .btn-close {
      background: rgba(255,255,255,.2); border: none; color: #fff;
      border-radius: 50%; width: 30px; height: 30px; font-size: 15px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .modal-body { padding: 18px 20px; }
    .detail-section { margin-bottom: 18px; }
    .detail-section h3 {
      font-size: 9pt; font-weight: 700; color: #2e7d32; text-transform: uppercase;
      letter-spacing: .4px; border-bottom: 1px solid #e0e0e0; padding-bottom: 4px; margin-bottom: 10px;
    }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; }
    .detail-item .k { font-size: 8pt; color: #888; }
    .detail-item .v { font-size: 10pt; font-weight: 600; color: #222; }
    .detail-item .v.empty { color: #bbb; font-weight: 400; font-style: italic; }
    .fotos-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: #2e7d32; color: #fff; border-radius: 6px;
      padding: 8px 18px; font-size: 10pt; font-weight: 700;
      text-decoration: none; margin-top: 6px;
    }

    /* ── VACÍO / CARGANDO ── */
    .estado { text-align: center; padding: 60px 20px; color: #aaa; }
    .estado .icono { font-size: 40px; margin-bottom: 12px; }
    .estado p { font-size: 11pt; }

    @media (max-width: 600px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .cards-grid { grid-template-columns: 1fr; padding: 0 12px 24px; }
      .filters { padding: 8px 12px 12px; }
      .stats-row { padding: 12px 12px 4px; }
      .topbar { padding: 10px 14px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">AV</div>
    <h2>AviVet</h2>
    <p>Panel de consultas telemedicina</p>
    <input type="password" id="codigo" placeholder="Código de acceso" onkeydown="if(event.key==='Enter') login()">
    <button class="login-btn" onclick="login()">Ingresar</button>
    <div class="login-error" id="login-error">Código incorrecto</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">AV</div>
      <div>
        <h1>Panel de Consultas</h1>
        <p>Telemedicina Avícola · AviVet</p>
      </div>
    </div>
    <div class="topbar-right">
      <span class="total-badge" id="total-badge">0 consultas</span>
      <button class="btn-refresh" onclick="cargarDatos()">↻ Actualizar</button>
    </div>
  </div>

  <div class="stats-row" id="stats-row"></div>

  <div class="filters">
    <input type="search" id="buscar" placeholder="Buscar productor, región, motivo…" oninput="filtrar()">
    <select id="filtro-region" onchange="filtrar()">
      <option value="">Todas las regiones</option>
    </select>
    <select id="filtro-motivo" onchange="filtrar()">
      <option value="">Todos los motivos</option>
    </select>
    <select id="filtro-sistema" onchange="filtrar()">
      <option value="">Todos los sistemas</option>
      <option>jaulas</option><option>piso</option><option>semilibertad</option>
    </select>
    <button class="btn-clear" onclick="limpiarFiltros()">Limpiar filtros</button>
  </div>

  <div class="cards-grid" id="cards-grid">
    <div class="estado"><div class="icono">⏳</div><p>Cargando consultas…</p></div>
  </div>
</div>

<!-- MODAL DETALLE -->
<div class="modal-overlay" id="modal-overlay" onclick="cerrarModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <h2 id="modal-titulo">—</h2>
        <div class="fecha" id="modal-fecha">—</div>
      </div>
      <button class="btn-close" onclick="cerrarModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbysLTpZKj4y47xd9qXM_WsZYJegyDN27UDajZr0JVpAg7J67YGqMt_ixVr3GJCWJcyljw/exec';
  const CODIGO_CORRECTO = 'avivet2026'; // debe coincidir con DATA_TOKEN en el Apps Script

  let todosLosDatos = [];

  // ── LOGIN ──────────────────────────────────────────────────
  function login() {
    const codigo = document.getElementById('codigo').value.trim();
    if (codigo === CODIGO_CORRECTO) {
      sessionStorage.setItem('av_auth', codigo);
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      cargarDatos();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  }

  // Auto-login si ya está autenticado
  if (sessionStorage.getItem('av_auth') === CODIGO_CORRECTO) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }

  // ── CARGAR DATOS ──────────────────────────────────────────
  async function cargarDatos() {
    document.getElementById('cards-grid').innerHTML = '<div class="estado"><div class="icono">⏳</div><p>Cargando consultas…</p></div>';
    try {
      const url = APPS_SCRIPT_URL + '?action=getData&token=' + CODIGO_CORRECTO;
      const res  = await fetch(url);
      const data = await res.json();
      todosLosDatos = data.reverse(); // más reciente primero
      poblarFiltros();
      renderStats();
      filtrar();
    } catch (err) {
      document.getElementById('cards-grid').innerHTML = '<div class="estado"><div class="icono">❌</div><p>Error al cargar datos.<br><small>' + err.message + '</small></p></div>';
    }
  }

  // ── FILTROS ───────────────────────────────────────────────
  function poblarFiltros() {
    const regiones = [...new Set(todosLosDatos.map(d => d['Región']).filter(Boolean))].sort();
    const motivos  = [...new Set(todosLosDatos.map(d => d['Motivo de consulta']).filter(Boolean))].sort();
    const selR = document.getElementById('filtro-region');
    const selM = document.getElementById('filtro-motivo');
    selR.innerHTML = '<option value="">Todas las regiones</option>' + regiones.map(r => `<option>${r}</option>`).join('');
    selM.innerHTML = '<option value="">Todos los motivos</option>' + motivos.map(m => `<option>${m}</option>`).join('');
  }

  function filtrar() {
    const q       = document.getElementById('buscar').value.toLowerCase();
    const region  = document.getElementById('filtro-region').value;
    const motivo  = document.getElementById('filtro-motivo').value;
    const sistema = document.getElementById('filtro-sistema').value;

    const filtrados = todosLosDatos.filter(d => {
      const texto = [d['Productor / empresa'], d['Región'], d['Motivo de consulta'], d['Localidad / comuna']].join(' ').toLowerCase();
      return (!q || texto.includes(q))
          && (!region  || d['Región'] === region)
          && (!motivo  || d['Motivo de consulta'] === motivo)
          && (!sistema || d['Sistema de alojamiento'] === sistema);
    });

    document.getElementById('total-badge').textContent = filtrados.length + ' consulta' + (filtrados.length !== 1 ? 's' : '');
    renderCards(filtrados);
  }

  function limpiarFiltros() {
    document.getElementById('buscar').value = '';
    document.getElementById('filtro-region').value = '';
    document.getElementById('filtro-motivo').value = '';
    document.getElementById('filtro-sistema').value = '';
    filtrar();
  }

  // ── STATS ─────────────────────────────────────────────────
  function renderStats() {
    const total    = todosLosDatos.length;
    const regiones = new Set(todosLosDatos.map(d => d['Región']).filter(Boolean)).size;
    const conFotos = todosLosDatos.filter(d => d['Fotos en Drive (URL carpeta)']).length;
    const estesMes = todosLosDatos.filter(d => {
      const ts = d['Timestamp (automático)'];
      if (!ts) return false;
      const f = new Date(ts);
      const hoy = new Date();
      return f.getMonth() === hoy.getMonth() && f.getFullYear() === hoy.getFullYear();
    }).length;

    document.getElementById('stats-row').innerHTML = `
      <div class="stat-card"><div class="num">${total}</div><div class="lbl">Consultas totales</div></div>
      <div class="stat-card"><div class="num">${estesMes}</div><div class="lbl">Este mes</div></div>
      <div class="stat-card"><div class="num">${regiones}</div><div class="lbl">Regiones</div></div>
      <div class="stat-card"><div class="num">${conFotos}</div><div class="lbl">Con fotos</div></div>
    `;
  }

  // ── TARJETAS ──────────────────────────────────────────────
  const MOTIVOS_ROJOS  = ['Mortalidad elevada','Problemas respiratorios'];
  const MOTIVOS_AMBER  = ['Caída de postura','Problemas digestivos / diarrea','Comportamiento (picaje, canibalismo)'];

  function colorMotivo(motivo) {
    if (MOTIVOS_ROJOS.some(m => motivo?.includes(m.split(' ')[0]))) return 'rojo';
    if (MOTIVOS_AMBER.some(m => motivo?.includes(m.split(' ')[0]))) return 'amber';
    return '';
  }

  function fmtFecha(ts) {
    if (!ts) return '—';
    const d = new Date(ts);
    if (isNaN(d)) return ts;
    return d.toLocaleDateString('es-CL', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function renderCards(datos) {
    if (!datos.length) {
      document.getElementById('cards-grid').innerHTML = '<div class="estado"><div class="icono">🔍</div><p>No hay consultas con esos filtros.</p></div>';
      return;
    }

    document.getElementById('cards-grid').innerHTML = datos.map((d, i) => {
      const productor = d['Productor / empresa'] || 'Sin nombre';
      const fecha     = fmtFecha(d['Timestamp (automático)']);
      const region    = d['Región'] || '';
      const motivo    = d['Motivo de consulta'] || '';
      const genetica  = d['Línea genética'] || '';
      const semana    = d['Semana de edad'] || '';
      const aves      = d['N° aves actuales'] || '';
      const postura   = d['% postura'] || '';
      const sistema   = d['Sistema de alojamiento'] || '';
      const lotes     = d['N° lotes en el plantel'] || '';
      const fotos     = d['Fotos en Drive (URL carpeta)'] || '';
      const idx       = todosLosDatos.indexOf(d);

      return `
        <div class="card" onclick="abrirDetalle(${idx})">
          <div class="card-header">
            <div>
              <div class="productor">${productor}</div>
              <div class="fecha">${fecha}</div>
            </div>
            ${region ? `<span class="region-badge">${region}</span>` : ''}
          </div>
          <div class="card-body">
            ${motivo ? `<span class="motivo-tag ${colorMotivo(motivo)}">${motivo}</span>` : ''}
            ${genetica ? `<div class="card-row"><span class="lbl">Línea genética</span><span class="val">${genetica}</span></div>` : ''}
            ${semana   ? `<div class="card-row"><span class="lbl">Semana de edad</span><span class="val">${semana}</span></div>` : ''}
            ${aves     ? `<div class="card-row"><span class="lbl">Aves actuales</span><span class="val">${parseInt(aves).toLocaleString('es-CL')}</span></div>` : ''}
            ${postura  ? `<div class="card-row"><span class="lbl">% postura</span><span class="val">${postura}%</span></div>` : ''}
          </div>
          <div class="card-footer">
            ${sistema ? `<span class="chip green">${sistema}</span>` : ''}
            ${lotes > 1 ? `<span class="chip">${lotes} lotes</span>` : ''}
            ${fotos ? `<a class="fotos-link" href="${fotos}" target="_blank" onclick="event.stopPropagation()">📷 Fotos</a>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  // ── MODAL DETALLE ─────────────────────────────────────────
  const SECCIONES_DETALLE = [
    { titulo: 'Identificación', campos: ['Productor / empresa','Teléfono','Email','Localidad / comuna','Región','Tipo de sesión'] },
    { titulo: 'Pabellón', campos: ['N° pabellones','Largo pabellón (m)','Ancho pabellón (m)','Altura cumbrera (m)','Orientación','Cubierta','Muro','Piso','Ventilación','Tipo iluminación','Horas luz artificial (h/día)','Lux medidos','Pabellones adicionales'] },
    { titulo: 'Sistema de alojamiento', campos: ['Sistema de alojamiento','Marca / modelo jaulas','N° pisos/módulo','N° módulos','Largo jaula (cm)','Profundidad jaula (cm)','Alto jaula (cm)','Aves por jaula','Área jaula (cm²)','cm²/ave (calculado)','Evaluación densidad jaulas','Material cama','Profundidad cama (cm)','Estado cama','Aves/m² (calculado)','m²/ave (calculado)'] },
    { titulo: 'Equipamiento', campos: ['Tipo comedero','N° comederos / m lineales','Diámetro comedero circular (cm)','Estado comederos','Tipo bebedero','N° bebederos','Fuente de agua','Tratamiento agua','Análisis de agua','Tipo nidal','N° nidales','Material nidal'] },
    { titulo: 'Lote', campos: ['N° lotes en el plantel','N° de este lote','Línea genética','Fecha nacimiento / llegada','Semana de edad','Etapa productiva','N° aves ingresadas','N° aves actuales','Mortalidad acumulada (%)','Sem. inicio postura','Datos lotes adicionales'] },
    { titulo: 'Parámetros productivos', campos: ['Total huevos producidos (día)','% postura','Peso corporal (g/ave)','Humedad relativa (%)','¿Tiene termómetro interior?','T° mínima registrada (°C)'] },
    { titulo: 'Alimentación', campos: ['Tipo alimento','N° veces alimenta al día','Horarios de alimentación','Obs. alimentación / suplementos'] },
    { titulo: 'Sanidad', campos: ['Programa vacunación','Última vacuna','Control ectoparásitos','Desinfección','Registro productivo','Otras especies en predio'] },
    { titulo: 'Motivo de consulta', campos: ['Motivo de consulta','Desde cuándo','% aves afectadas','Diagnósticos previos','Descripción del problema','Tratamientos aplicados'] },
    { titulo: 'Fotos', campos: ['Observaciones fotos'] },
  ];

  function abrirDetalle(idx) {
    const d = todosLosDatos[idx];
    document.getElementById('modal-titulo').textContent = d['Productor / empresa'] || 'Sin nombre';
    document.getElementById('modal-fecha').textContent  = fmtFecha(d['Timestamp (automático)']) + (d['Región'] ? ' · ' + d['Región'] : '');

    const fotos = d['Fotos en Drive (URL carpeta)'];
    let html = '';

    if (fotos) {
      html += `<div style="margin-bottom:16px;"><a class="fotos-btn" href="${fotos}" target="_blank">📷 Ver fotos en Drive</a></div>`;
    }

    SECCIONES_DETALLE.forEach(sec => {
      const items = sec.campos.map(campo => {
        const val = d[campo];
        if (!val && val !== 0) return null;
        return `<div class="detail-item"><div class="k">${campo}</div><div class="v">${val}</div></div>`;
      }).filter(Boolean);
      if (!items.length) return;
      html += `<div class="detail-section"><h3>${sec.titulo}</h3><div class="detail-grid">${items.join('')}</div></div>`;
    });

    document.getElementById('modal-body').innerHTML = html || '<p style="color:#aaa;text-align:center;padding:20px;">Sin datos registrados.</p>';
    document.getElementById('modal-overlay').classList.add('active');
  }

  function cerrarModal(e) {
    if (!e || e.target === document.getElementById('modal-overlay')) {
      document.getElementById('modal-overlay').classList.remove('active');
    }
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarModal(); });

  // Auto-cargar si ya estaba autenticado
  if (sessionStorage.getItem('av_auth') === CODIGO_CORRECTO) cargarDatos();
</script>
</body>
</html>
