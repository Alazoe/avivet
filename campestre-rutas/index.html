<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Campestre — Gestión de Rutas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-brand">
      <div class="dot"></div>
      La Campestre — Rutas
    </div>
    <span id="semana-label" class="topbar-semana"></span>
  </header>

  <!-- Layout principal -->
  <div class="layout">

    <!-- Panel izquierdo -->
    <aside class="panel-izq">

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn activo" onclick="switchTab('plan', this)">Plan Semanal</button>
        <button class="tab-btn" onclick="switchTab('semana', this)">Rutas</button>
        <button class="tab-btn" onclick="switchTab('productores', this)">Productores</button>
      </div>

      <div class="tab-content">

        <!-- TAB PLAN SEMANAL -->
        <div class="tab-pane activo" id="tab-plan">
          <div class="semana-row">
            <input type="date" id="fecha-semana" class="input input-sm" style="max-width:160px" onchange="cargarPlan()" />
            <button class="btn btn-danger btn-sm" onclick="inicializarSemanaAltas()" title="Agrega automáticamente los productores ALTA los Lunes y Jueves">
              ⭐ Fijar ALTA
            </button>
            <button class="btn btn-outline btn-sm" onclick="irSemanaActual()">Hoy</button>
          </div>
          <div id="resumen-semana"></div>
          <div id="plan-por-dia"></div>
        </div>

        <!-- TAB RUTAS -->
        <div class="tab-pane" id="tab-semana">

          <!-- Retiro fijo ALTA -->
          <div class="card">
            <div class="card-header alta">
              <span class="card-title">⭐ Retiro Fijo — ALTA Prioridad</span>
              <span class="badge badge-num" id="badge-altas">0</span>
            </div>
            <div class="card-body">
              <p class="vacio" style="padding:0 0 6px">Lunes y Jueves — siempre incluidos</p>
              <div id="lista-altas"></div>
              <div style="display:flex;gap:6px;margin-top:8px">
                <button class="btn btn-danger btn-sm" style="flex:1;justify-content:center" onclick="generarRuta('Lunes')">
                  📍 Ruta Lunes
                </button>
                <button class="btn btn-danger btn-sm" style="flex:1;justify-content:center" onclick="generarRuta('Jueves')">
                  📍 Ruta Jueves
                </button>
              </div>
            </div>
          </div>

          <!-- Productores MEDIA/BAJA -->
          <div class="card">
            <div class="card-header">
              <span class="card-title">📋 Productores esta semana</span>
              <span class="badge badge-num" id="badge-seleccionados">0 selec.</span>
            </div>
            <div class="card-body">
              <div class="search-wrap">
                <input type="text" id="filtro-prod" class="input input-sm" placeholder="Buscar productor..." oninput="filtrarProductores()" />
              </div>
              <div id="lista-productores" class="prod-lista"></div>
            </div>
          </div>

          <!-- Vehículos -->
          <div class="card">
            <div class="card-header">
              <span class="card-title">🚚 Vehículos</span>
            </div>
            <div class="card-body">
              <div id="lista-vehiculos"></div>
            </div>
          </div>

          <button class="btn btn-primary btn-full" onclick="optimizarRutas()">
            🗺️ Optimizar Rutas Semanales
          </button>

          <div id="resultado-rutas" style="margin-top:10px"></div>
        </div>

        <!-- TAB PRODUCTORES -->
        <div class="tab-pane" id="tab-productores">
          <div class="search-wrap" style="margin-bottom:10px">
            <input type="text" id="filtro-all" class="input input-sm" placeholder="Buscar productor o comuna..." oninput="filtrarTodos()" />
          </div>
          <div id="tabla-productores"></div>
        </div>

      </div>
    </aside>

    <!-- Mapa -->
    <div id="map"></div>

  </div>

  <!-- Modal: Agregar al plan -->
  <div class="modal-overlay" id="modal-agregar" onclick="closeModalOutside(event,'modal-agregar')">
    <div class="modal">
      <div class="modal-header">
        <h3>Agregar al plan</h3>
        <button class="btn-icon" onclick="closeModal('modal-agregar')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="plan-dia" />
        <div class="form-group">
          <label>Día</label>
          <span id="plan-dia-label" style="font-size:14px;font-weight:600;color:var(--texto)"></span>
        </div>
        <div class="form-group">
          <label>Productor</label>
          <select id="plan-productor" class="input">
            <option value="">Seleccionar...</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Retiro (cajas)</label>
            <input type="number" id="plan-cajas" class="input" value="0" min="0" />
          </div>
          <div class="form-group">
            <label>Despacho alimento (kg)</label>
            <input type="number" id="plan-despacho" class="input" value="0" min="0" step="0.5" />
          </div>
        </div>
        <div class="form-group">
          <label>Vehículo</label>
          <select id="plan-vehiculo" class="input"></select>
        </div>
        <div class="form-group">
          <label>Notas</label>
          <input type="text" id="plan-notas" class="input" placeholder="Opcional..." />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('modal-agregar')">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarEntradaPlan()">Agregar</button>
      </div>
    </div>
  </div>

  <!-- Modal: Editar productor -->
  <div class="modal-overlay" id="modal-productor" onclick="closeModalOutside(event,'modal-productor')">
    <div class="modal">
      <div class="modal-header">
        <h3>Editar Productor</h3>
        <button class="btn-icon" onclick="closeModal('modal-productor')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-id" />
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="edit-nombre" class="input" />
        </div>
        <div class="form-group">
          <label>Comuna</label>
          <input type="text" id="edit-comuna" class="input" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Latitud</label>
            <input type="number" id="edit-lat" class="input" step="0.00001" />
          </div>
          <div class="form-group">
            <label>Longitud</label>
            <input type="number" id="edit-lon" class="input" step="0.00001" />
          </div>
        </div>
        <div class="form-group">
          <label>Prioridad</label>
          <select id="edit-prioridad" class="input">
            <option>ALTA</option>
            <option>MEDIA</option>
            <option>BAJA</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('modal-productor')">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarProductor()">Guardar</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
